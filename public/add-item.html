<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Auction - LuxBid</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
    padding:20px;
}

form{
    max-width:500px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    padding:12px;
    border-radius:8px;
    border:none;
}

button{
    background:#f4c542;
    border:none;
    padding:15px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>➕ Add New Auction</h1>

<form id="auctionForm">

<input
id="name"
placeholder="Item Name"
required
>

<textarea
id="origin"
placeholder="Description"
required
></textarea>

<input
id="price"
type="number"
placeholder="Starting Price"
required
>

<button type="submit">
Create Auction
</button>

</form>

<script>

const sb = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

document
.getElementById("auctionForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const name =
document.getElementById("name").value;

const origin =
document.getElementById("origin").value;

const price =
Number(document.getElementById("price").value);

const endTime =
new Date(
Date.now() + 7*24*60*60*1000
).toISOString();

const { error } = await sb
.from("items")
.insert([
{
name,
origin,
current_price: price,
status:"active",
end_time:endTime
}
]);

if(error){
alert("Error: " + error.message);
return;
}

alert("Auction Created Successfully");

});

</script>

</body>
</html>
